spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loan_origination}
    username: ${DB_USERNAME:loan_app}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:15}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    com.example.loanoriginationsystem: INFO
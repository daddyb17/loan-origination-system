spring:
  application:
    name: loan-origination-system
  profiles:
    default: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:loan-origination-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring.json.add-type-headers: false

kafka:
  topics:
    loan-events: ${KAFKA_TOPIC_LOAN_EVENTS:loan-events}
  topic-partitions:
    loan-events: ${KAFKA_TOPIC_LOAN_EVENTS_PARTITIONS:3}
  topic-replication-factor:
    loan-events: ${KAFKA_TOPIC_LOAN_EVENTS_REPLICATION_FACTOR:1}

outbox:
  processor-delay-ms: ${OUTBOX_PROCESSOR_DELAY_MS:5000}
  max-retries: ${OUTBOX_MAX_RETRIES:3}
  publish-timeout-seconds: ${OUTBOX_PUBLISH_TIMEOUT_SECONDS:5}
  processing-timeout-seconds: ${OUTBOX_PROCESSING_TIMEOUT_SECONDS:60}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.example.loanoriginationsystem: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId}] [%thread] %logger{36} - %msg%n"
